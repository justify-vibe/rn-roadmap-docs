<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bg)"/>

  <!-- Floating dots -->
  <circle cx="80" cy="100" r="6" fill="#6c63ff" opacity="0.5"/>
  <circle cx="320" cy="80" r="4" fill="#ff6b9d" opacity="0.4"/>
  <circle cx="340" cy="280" r="8" fill="#43e97b" opacity="0.3"/>
  <circle cx="60" cy="300" r="5" fill="#38d9f5" opacity="0.4"/>
  <circle cx="200" cy="50" r="4" fill="#f7971e" opacity="0.5"/>

  <!-- Phone body -->
  <rect x="130" y="70" width="140" height="260" rx="22" ry="22" fill="url(#phone)" stroke="#3a3a5c" stroke-width="2"/>

  <!-- Screen -->
  <rect x="142" y="90" width="116" height="220" rx="10" ry="10" fill="url(#screen)"/>

  <!-- Notch -->
  <rect x="175" y="86" width="50" height="10" rx="5" fill="#0a0a15"/>

  <!-- Screen content: nav bar -->
  <rect x="142" y="90" width="116" height="28" rx="10" fill="#1a1a3e"/>
  <circle cx="160" cy="104" r="7" fill="#6c63ff" opacity="0.8"/>
  <rect x="173" y="100" width="40" height="6" rx="3" fill="#e8e8f0" opacity="0.6"/>

  <!-- Screen content: cards -->
  <rect x="152" y="126" width="96" height="40" rx="8" fill="rgba(108,99,255,0.25)" stroke="rgba(108,99,255,0.4)" stroke-width="1"/>
  <rect x="160" y="134" width="35" height="5" rx="2.5" fill="#e8e8f0" opacity="0.7"/>
  <rect x="160" y="143" width="55" height="4" rx="2" fill="#9090b8" opacity="0.6"/>
  <rect x="205" y="132" width="30" height="18" rx="4" fill="rgba(67,233,123,0.3)"/>
  <rect x="211" y="138" width="18" height="4" rx="2" fill="#43e97b" opacity="0.9"/>

  <rect x="152" y="174" width="96" height="40" rx="8" fill="rgba(255,107,157,0.15)" stroke="rgba(255,107,157,0.3)" stroke-width="1"/>
  <rect x="160" y="182" width="45" height="5" rx="2.5" fill="#e8e8f0" opacity="0.7"/>
  <rect x="160" y="191" width="35" height="4" rx="2" fill="#9090b8" opacity="0.6"/>

  <rect x="152" y="222" width="96" height="40" rx="8" fill="rgba(56,217,245,0.15)" stroke="rgba(56,217,245,0.3)" stroke-width="1"/>
  <rect x="160" y="230" width="50" height="5" rx="2.5" fill="#e8e8f0" opacity="0.7"/>
  <rect x="160" y="239" width="40" height="4" rx="2" fill="#9090b8" opacity="0.6"/>

  <!-- Bottom button -->
  <rect x="162" y="272" width="76" height="24" rx="12" fill="url(#btn)"/>
  <rect x="182" y="281" width="36" height="5" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Home indicator -->
  <rect x="177" y="318" width="46" height="4" rx="2" fill="#3a3a5c"/>

  <!-- Floating code snippets -->
  <rect x="30" y="155" width="88" height="52" rx="8" fill="#12121a" stroke="#2a2a40" stroke-width="1" opacity="0.9"/>
  <rect x="40" y="164" width="50" height="4" rx="2" fill="#6c63ff" opacity="0.8"/>
  <rect x="40" y="173" width="68" height="3" rx="1.5" fill="#9090b8" opacity="0.5"/>
  <rect x="40" y="181" width="55" height="3" rx="1.5" fill="#43e97b" opacity="0.5"/>
  <rect x="40" y="189" width="42" height="3" rx="1.5" fill="#f7971e" opacity="0.5"/>

  <rect x="282" y="175" width="88" height="52" rx="8" fill="#12121a" stroke="#2a2a40" stroke-width="1" opacity="0.9"/>
  <rect x="292" y="184" width="45" height="4" rx="2" fill="#ff6b9d" opacity="0.8"/>
  <rect x="292" y="193" width="68" height="3" rx="1.5" fill="#9090b8" opacity="0.5"/>
  <rect x="292" y="201" width="50" height="3" rx="1.5" fill="#38d9f5" opacity="0.5"/>
  <rect x="292" y="209" width="38" height="3" rx="1.5" fill="#6c63ff" opacity="0.5"/>
</svg>
